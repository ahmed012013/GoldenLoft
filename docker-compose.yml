services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: goldenloft-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: goldenloft
      POSTGRES_PASSWORD: ${DB_PASSWORD:-goldenloft_password}
      POSTGRES_DB: goldenloft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goldenloft-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U goldenloft" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    container_name: goldenloft-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://goldenloft:${DB_PASSWORD:-goldenloft_password}@postgres:5432/goldenloft?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_this_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_jwt_refresh_secret_change_this_in_production}
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 20
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goldenloft-network
    command: sh -c "npx prisma migrate deploy && node dist/backend/src/main.js"

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: goldenloft-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - goldenloft-network

networks:
  goldenloft-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
